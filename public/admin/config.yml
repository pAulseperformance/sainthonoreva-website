backend:
  name: github
  repo: pAulseperformance/sainthonoreva-website
  branch: main
  base_url: https://auth.sainthonoreva.com

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Info"
    files:
      - name: "site"
        label: "Site Settings"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "Bakery Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Copyright", name: "copyright", widget: "string" }
          - label: "Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Days", name: "days", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }

  - name: "story"
    label: "Our Story"
    files:
      - name: "story"
        label: "Our Story"
        file: "content/story.json"
        format: "json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Image Alt Text", name: "image_alt", widget: "string" }

  - name: "menu"
    label: "Menu"
    files:
      - name: "menu"
        label: "Menu Items"
        file: "content/menu.json"
        format: "json"
        fields:
          - { label: "Description", name: "description", widget: "text" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price", name: "price", widget: "string" }

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery"
        label: "Gallery Items"
        file: "content/gallery.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "string" }
